<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>முழுமையான படிவ உருவாக்கி - Left/Right Move</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #dc2626;
            --light: #f8fafc;
            --dark: #0f172a;
            --border: #cbd5e1;
            --success: #059669;
            --warning: #d97706;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Nirmala UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .app-header {
            background: linear-gradient(to right, var(--primary), #1e40af);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .app-header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .app-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 75vh;
        }

        @media (max-width: 1100px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .controls-panel {
            background: var(--light);
            padding: 20px;
            border-right: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
        }

        .form-preview {
            padding: 25px;
            background: white;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            margin: 20px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--dark);
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #1e40af;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--secondary);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-info {
            background: #0891b2;
            color: white;
        }

        .btn-info:hover {
            background: #0e7490;
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 11px;
        }

        .btn-block {
            width: 100%;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        /* தலைப்பு வரிகள் மேலாண்மை */
        .title-rows-manager {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }

        .title-row-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .title-row-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 13px;
        }

        .title-row-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .title-row-actions {
            display: flex;
            gap: 5px;
        }

        /* PAN Card Field Styles */
        .pan-card-field {
            margin: 15px 0 20px 0;
            padding: 15px;
            background: #e0f2fe;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .pan-card-field .field-label {
            color: #1e3a8a;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .pan-card-field .field-input {
            background: white;
            border: 1px solid #93c5fd;
            text-transform: uppercase;
        }

        .pan-hint {
            font-size: 11px;
            color: #475569;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pan-format {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 11px;
        }

        /* Custom Footer Field Styles */
        .custom-footer-field {
            margin: 25px 0 20px 0;
            padding: 15px;
            background: #fef3c7;
            border-radius: 8px;
            border-left: 4px solid var(--warning);
        }

        /* படிவ முன்னோட்டம் */
        .form-preview-page {
            background: white;
            min-height: 1123px;
            padding: 30px 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.08);
            margin: 0 auto;
            position: relative;
        }

        .form-header {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary);
        }

        .logo-section, .stamp-section {
            text-align: center;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin: 0 auto 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            cursor: pointer;
        }

        .logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .logo-placeholder {
            color: #94a3b8;
            font-size: 24px;
        }

        .title-section {
            text-align: center;
        }

        .form-main-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .form-sub-title {
            font-size: 16px;
            color: #475569;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-details {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .form-body {
            margin-top: 20px;
        }

        /* பீல்டு ஸ்டைல்கள் */
        .field-row {
            margin-bottom: 20px;
            position: relative;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .field-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 6px;
            display: block;
        }

        .field-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            line-height: 1.4;
        }

        .field-input.large {
            min-height: 100px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        .field-input.extra-large {
            min-height: 180px;
            padding: 18px;
            font-size: 14px;
            line-height: 1.6;
        }

        /* லேஅவுட் ஸ்டைல்கள் */
        .layout-single {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .layout-double {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            align-items: start;
        }

        .double-column-left, .double-column-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .layout-mixed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mixed-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .mixed-row.full-width {
            grid-template-columns: 1fr;
        }

        /* கட்டாய கட்டங்கள் */
        .required-documents {
            margin: 25px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .documents-list {
            list-style: decimal;
            padding-left: 20px;
            margin-top: 10px;
        }

        .documents-list li {
            margin-bottom: 8px;
            line-height: 1.4;
            font-size: 14px;
        }

        /* கலர் பிக்கர் */
        .color-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-option.active {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        /* பிரிண்ட் ஸ்டைல்கள் */
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            
            .app-header,
            .controls-panel,
            .form-actions,
            .section-title i,
            .btn,
            .color-picker,
            .field-controls,
            .layout-selector,
            .title-rows-manager {
                display: none !important;
            }
            
            .form-preview {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }
            
            .form-preview-page {
                box-shadow: none !important;
                padding: 20mm !important;
                margin: 0 !important;
                page-break-after: always;
                min-height: auto !important;
            }
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .field-controls {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .layout-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .layout-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.3s;
        }

        .layout-btn.active {
            border-color: var(--primary);
            background: #e0f2fe;
            font-weight: 600;
        }

        .language-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .lang-btn {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .lang-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .predefined-fields {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .predefined-field {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .predefined-field:hover {
            background: #e0f2fe;
            border-color: var(--primary);
        }

        .field-edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .edit-field-row {
            margin-bottom: 15px;
        }

        .edit-field-row label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 500;
        }

        .edit-field-row input,
        .edit-field-row textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .column-indicator {
            font-size: 11px;
            background: #e0e7ff;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const React = window.React;
        const ReactDOM = window.ReactDOM;

        function AdvancedFormBuilder() {
            // படிவ அமைப்புகள்
            const [settings, setSettings] = React.useState({
                formTitle: 'விண்ணப்பப் படிவம்',
                formTitleEn: 'Application Form',
                formSubtitle: 'மாணவர் சேர்க்கை விண்ணப்பம்',
                formSubtitleEn: 'Student Admission Application',
                language: 'tamil',
                layout: 'mixed',
                textColor: '#000000',
                backgroundColor: '#ffffff'
            });

            // தலைப்பு வரிகள்
            const [titleRows, setTitleRows] = React.useState([
                { id: 1, text: 'தமிழ்நாடு அரசு', textEn: 'Government of Tamil Nadu' },
                { id: 2, text: 'கல்வி துறை', textEn: 'Education Department' },
                { id: 3, text: 'படிவம் எண்: TN/EDU/2024/001', textEn: 'Form No: TN/EDU/2024/001' }
            ]);

            // LEFT/RIGHT க்காக fields array - column property added
            const [fields, setFields] = React.useState([
                { id: 1, type: 'text', label: 'விண்ணப்பதாரர் பெயர்', labelEn: 'Applicant Name', placeholder: 'முழு பெயரை உள்ளிடவும்', placeholderEn: 'Enter full name', size: 'medium', required: true, column: 'left' },
                { id: 2, type: 'text', label: 'தந்தை பெயர்', labelEn: 'Father Name', placeholder: 'தந்தையின் முழு பெயர்', placeholderEn: 'Enter father\'s full name', size: 'medium', required: true, column: 'left' },
                { id: 3, type: 'date', label: 'பிறந்த தேதி', labelEn: 'Date of Birth', placeholder: 'பிறந்த தேதியைத் தேர்ந்தெடுக்கவும்', placeholderEn: 'Select date of birth', size: 'medium', required: true, column: 'left' },
                { id: 4, type: 'tel', label: 'தொலைபேசி எண்', labelEn: 'Phone Number', placeholder: '10 இலக்க தொலைபேசி எண்', placeholderEn: '10 digit phone number', size: 'medium', required: true, column: 'right' },
                { id: 5, type: 'email', label: 'மின்னஞ்சல்', labelEn: 'Email', placeholder: 'மின்னஞ்சல் முகவரி', placeholderEn: 'Email address', size: 'medium', required: false, column: 'right' },
                { id: 6, type: 'select', label: 'பாலினம்', labelEn: 'Gender', placeholder: 'பாலினத்தைத் தேர்ந்தெடுக்கவும்', placeholderEn: 'Select gender', size: 'medium', required: true, options: ['ஆண்', 'பெண்', 'மற்றவை'], optionsEn: ['Male', 'Female', 'Other'], column: 'right' },
                { id: 7, type: 'address', label: 'முகவரி', labelEn: 'Address', placeholder: 'முழு முகவரியை உள்ளிடவும்', placeholderEn: 'Enter full address', size: 'large', required: true, column: 'left' }
            ]);

            // ========== PAN CARD FIELD ==========
            const [panField, setPanField] = React.useState({
                title: 'பான் கார்டு எண்',
                titleEn: 'PAN Card Number',
                placeholder: 'ABCDE1234F',
                placeholderEn: 'ABCDE1234F',
                value: '',
                enabled: true
            });

            // ========== CUSTOM FOOTER FIELD ==========
            const [footerField, setFooterField] = React.useState({
                title: 'கூடுதல் தகவல்கள்',
                titleEn: 'Additional Information',
                placeholder: 'இங்கே உங்கள் கூடுதல் தகவல்களை எழுதவும்...',
                placeholderEn: 'Write your additional information here...',
                value: '',
                enabled: true
            });

            // லோகோக்கள்
            const [logo1, setLogo1] = React.useState(null);
            const [logo2, setLogo2] = React.useState(null);
            
            // பீல்டு எடிட் மோடல்
            const [editingField, setEditingField] = React.useState(null);

            // முன்னரே வரையறுக்கப்பட்ட பீல்டுகள்
            const predefinedFields = [
                { type: 'text', label: 'பெயர்', labelEn: 'Name', icon: 'fas fa-user' },
                { type: 'date', label: 'பிறந்த தேதி', labelEn: 'Date of Birth', icon: 'fas fa-calendar' },
                { type: 'tel', label: 'தொலைபேசி', labelEn: 'Phone', icon: 'fas fa-phone' },
                { type: 'email', label: 'மின்னஞ்சல்', labelEn: 'Email', icon: 'fas fa-envelope' },
                { type: 'address', label: 'முகவரி', labelEn: 'Address', icon: 'fas fa-map-marker-alt' },
                { type: 'select', label: 'பாலினம்', labelEn: 'Gender', icon: 'fas fa-venus-mars' },
                { type: 'textarea', label: 'நீண்ட உரை', labelEn: 'Textarea', icon: 'fas fa-paragraph' }
            ];

            // கலர் விருப்பங்கள்
            const colorOptions = [
                '#000000', '#1e3a8a', '#0369a1', '#0f766e', '#059669',
                '#ca8a04', '#ea580c', '#dc2626', '#7c3aed', '#db2777'
            ];

            const updateSetting = (key, value) => {
                setSettings(prev => ({ ...prev, [key]: value }));
            };

            // ========== தலைப்பு வரிகள் மேலாண்மை ==========
            const addTitleRow = () => {
                setTitleRows([...titleRows, { id: Date.now(), text: 'புதிய வரி', textEn: 'New Line' }]);
            };

            const removeTitleRow = (id) => {
                if (titleRows.length > 1) {
                    setTitleRows(titleRows.filter(row => row.id !== id));
                } else {
                    alert('குறைந்தது ஒரு தலைப்பு வரியாவது இருக்க வேண்டும்!');
                }
            };

            const updateTitleRow = (id, text, isTamil = true) => {
                setTitleRows(titleRows.map(row => 
                    row.id === id ? { ...row, [isTamil ? 'text' : 'textEn']: text } : row
                ));
            };

            // ========== PAN Card Field Functions ==========
            const updatePanTitle = (title, isTamil = true) => {
                if (isTamil) {
                    setPanField(prev => ({ ...prev, title: title }));
                } else {
                    setPanField(prev => ({ ...prev, titleEn: title }));
                }
            };

            const updatePanPlaceholder = (placeholder, isTamil = true) => {
                if (isTamil) {
                    setPanField(prev => ({ ...prev, placeholder: placeholder }));
                } else {
                    setPanField(prev => ({ ...prev, placeholderEn: placeholder }));
                }
            };

            // ========== Footer Field Functions ==========
            const updateFooterTitle = (title, isTamil = true) => {
                if (isTamil) {
                    setFooterField(prev => ({ ...prev, title: title }));
                } else {
                    setFooterField(prev => ({ ...prev, titleEn: title }));
                }
            };

            const updateFooterPlaceholder = (placeholder, isTamil = true) => {
                if (isTamil) {
                    setFooterField(prev => ({ ...prev, placeholder: placeholder }));
                } else {
                    setFooterField(prev => ({ ...prev, placeholderEn: placeholder }));
                }
            };

            // ========== பீல்டு மேலாண்மை (Left/Right Move with) ==========
            const addField = (fieldType, label = '', labelEn = '') => {
                let size = 'medium';
                if (fieldType === 'address') size = 'large';
                if (fieldType === 'textarea') size = 'large';

                // புதிய பீல்டு எந்த column-ல் சேர்க்க வேண்டும்? (default left)
                const leftCount = fields.filter(f => f.column === 'left').length;
                const rightCount = fields.filter(f => f.column === 'right').length;
                const newColumn = leftCount <= rightCount ? 'left' : 'right';

                const newField = {
                    id: Date.now(),
                    type: fieldType,
                    label: label || `புதிய ${fieldType}`,
                    labelEn: labelEn || `New ${fieldType}`,
                    placeholder: 'தகவலை உள்ளிடவும்...',
                    placeholderEn: 'Enter information...',
                    size: size,
                    required: false,
                    column: newColumn,
                    options: fieldType === 'select' ? ['விருப்பம் 1', 'விருப்பம் 2'] : undefined,
                    optionsEn: fieldType === 'select' ? ['Option 1', 'Option 2'] : undefined
                };
                setFields([...fields, newField]);
            };

            const removeField = (id) => {
                setFields(fields.filter(field => field.id !== id));
            };

            const updateField = (id, updates) => {
                setFields(fields.map(field => field.id === id ? { ...field, ...updates } : field));
            };

            // Up/Down movement (same column)
            const moveFieldUpDown = (id, direction) => {
                const index = fields.findIndex(f => f.id === id);
                if (index === -1) return;
                
                const targetIndex = direction === 'up' ? index - 1 : index + 1;
                if (targetIndex < 0 || targetIndex >= fields.length) return;
                
                const newFields = [...fields];
                [newFields[index], newFields[targetIndex]] = [newFields[targetIndex], newFields[index]];
                setFields(newFields);
            };

            // Left/Right movement (change column)
            const moveFieldLeftRight = (id, direction) => {
                const field = fields.find(f => f.id === id);
                if (!field) return;
                
                const newColumn = direction === 'left' ? 'left' : 'right';
                if (field.column === newColumn) return; // Already in that column
                
                // Update the field's column
                setFields(fields.map(f => 
                    f.id === id ? { ...f, column: newColumn } : f
                ));
            };

            // லோகோ பதிவேற்றம்
            const handleLogoUpload = (setLogoFunc) => (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => setLogoFunc(event.target.result);
                    reader.readAsDataURL(file);
                }
            };

            // மொழி உதவி
            const getText = (tamil, english) => settings.language === 'tamil' ? tamil : english;

            // பீல்டு உள்ளீடு காட்ட
            const renderFieldInput = (field) => {
                const placeholder = getText(field.placeholder, field.placeholderEn);
                if (field.type === 'select') {
                    const options = settings.language === 'english' && field.optionsEn ? field.optionsEn : field.options;
                    return (
                        <select className="field-input" style={{color: settings.textColor}}>
                            <option value="">{getText('தேர்ந்தெடுக்கவும்', 'Select')}</option>
                            {options?.map((opt, idx) => <option key={idx} value={opt}>{opt}</option>)}
                        </select>
                    );
                } else if (field.type === 'address' || field.type === 'textarea') {
                    return <textarea className={`field-input ${field.size}`} placeholder={placeholder} rows={4} style={{color: settings.textColor}} />;
                } else {
                    return <input type={field.type} className="field-input" placeholder={placeholder} style={{color: settings.textColor}} />;
                }
            };

            // ========== பீல்டு ஐட்டம் காட்ட (Left/Right buttons with) ==========
            const renderFieldItem = (field, showColumnButtons = true) => {
                const labelText = getText(field.label, field.labelEn);
                const isDoubleLayout = settings.layout === 'double';
                
                return (
                    <div key={field.id} className="field-row">
                        <label className="field-label">
                            {labelText}{field.required && <span style={{color: 'red'}}>*</span>}
                            {isDoubleLayout && (
                                <span className="column-indicator">
                                    <i className="fas fa-columns"></i> {field.column === 'left' ? getText('இடது', 'Left') : getText('வலது', 'Right')}
                                </span>
                            )}
                        </label>
                        {renderFieldInput(field)}
                        <div className="field-controls">
                            <button className="btn btn-primary btn-sm" onClick={() => moveFieldUpDown(field.id, 'up')} title={getText('மேல் நகர்த்து', 'Move Up')}>
                                <i className="fas fa-arrow-up"></i>
                            </button>
                            <button className="btn btn-primary btn-sm" onClick={() => moveFieldUpDown(field.id, 'down')} title={getText('கீழ் நகர்த்து', 'Move Down')}>
                                <i className="fas fa-arrow-down"></i>
                            </button>
                            {/* Left/Right buttons - only in double column layout */}
                            {isDoubleLayout && (
                                <>
                                    <button className="btn btn-info btn-sm" onClick={() => moveFieldLeftRight(field.id, 'left')} title={getText('இடது நெடுவரிசைக்கு நகர்த்து', 'Move to Left Column')}>
                                        <i className="fas fa-arrow-left"></i> L
                                    </button>
                                    <button className="btn btn-info btn-sm" onClick={() => moveFieldLeftRight(field.id, 'right')} title={getText('வலது நெடுவரிசைக்கு நகர்த்து', 'Move to Right Column')}>
                                        R <i className="fas fa-arrow-right"></i>
                                    </button>
                                </>
                            )}
                            <button className="btn btn-warning btn-sm" onClick={() => setEditingField(field)} title={getText('திருத்து', 'Edit')}>
                                <i className="fas fa-edit"></i>
                            </button>
                            <button className="btn btn-danger btn-sm" onClick={() => removeField(field.id)} title={getText('நீக்கு', 'Delete')}>
                                <i className="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                );
            };

            // ========== லேஅவுட் பொறுத்து பீல்டுகள் ==========
            const renderFieldsByLayout = () => {
                if (settings.layout === 'single') {
                    // Single column - show all fields in order
                    return <div className="layout-single">{fields.map(f => renderFieldItem(f, false))}</div>;
                } else if (settings.layout === 'double') {
                    // Double column - split by column property
                    const leftFields = fields.filter(f => f.column === 'left');
                    const rightFields = fields.filter(f => f.column === 'right');
                    
                    return (
                        <div className="layout-double">
                            <div className="double-column-left">
                                <div style={{background: '#e0e7ff', padding: '5px 10px', borderRadius: '6px', marginBottom: '10px', fontSize: '12px', fontWeight: 'bold', textAlign: 'center'}}>
                                    <i className="fas fa-arrow-left"></i> {getText('இடது நெடுவரிசை', 'Left Column')}
                                </div>
                                {leftFields.map(f => renderFieldItem(f, true))}
                                {leftFields.length === 0 && (
                                    <div style={{color: '#94a3b8', textAlign: 'center', padding: '20px', border: '1px dashed var(--border)', borderRadius: '8px'}}>
                                        {getText('பீல்டுகளை இங்கே நகர்த்தவும்', 'Move fields here')}
                                    </div>
                                )}
                            </div>
                            <div className="double-column-right">
                                <div style={{background: '#e0e7ff', padding: '5px 10px', borderRadius: '6px', marginBottom: '10px', fontSize: '12px', fontWeight: 'bold', textAlign: 'center'}}>
                                    {getText('வலது நெடுவரிசை', 'Right Column')} <i className="fas fa-arrow-right"></i>
                                </div>
                                {rightFields.map(f => renderFieldItem(f, true))}
                                {rightFields.length === 0 && (
                                    <div style={{color: '#94a3b8', textAlign: 'center', padding: '20px', border: '1px dashed var(--border)', borderRadius: '8px'}}>
                                        {getText('பீல்டுகளை இங்கே நகர்த்தவும்', 'Move fields here')}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                } else {
                    // Mixed layout - first half in double column, rest full width
                    const mid = Math.ceil(fields.length / 2);
                    const leftFields = fields.slice(0, mid);
                    const rightFields = fields.slice(mid);
                    
                    return (
                        <div className="layout-mixed">
                            <div className="mixed-row">
                                <div>{leftFields.map(f => renderFieldItem(f, false))}</div>
                                <div>{rightFields.map(f => renderFieldItem(f, false))}</div>
                            </div>
                        </div>
                    );
                }
            };

            // ========== PAN CARD FIELD RENDER ==========
            const renderPanCardField = () => {
                const title = getText(panField.title, panField.titleEn);
                const placeholder = getText(panField.placeholder, panField.placeholderEn);
                
                return (
                    <div className="pan-card-field">
                        <label className="field-label">
                            {title} <span style={{color: 'red'}}>*</span>
                        </label>
                        <input
                            type="text"
                            className="field-input"
                            placeholder={placeholder}
                            value={panField.value}
                            onChange={(e) => {
                                let val = e.target.value.toUpperCase();
                                setPanField(prev => ({ ...prev, value: val }));
                            }}
                            style={{color: settings.textColor, textTransform: 'uppercase'}}
                            maxLength="10"
                        />
                        <div className="pan-hint">
                            <span className="pan-format"><i className="fas fa-info-circle"></i> வடிவமைப்பு: ABCDE1234F</span>
                            <span>5 எழுத்துக்கள் + 4 இலக்கங்கள் + 1 எழுத்து</span>
                        </div>
                    </div>
                );
            };

            // ========== CUSTOM FOOTER FIELD RENDER ==========
            const renderFooterField = () => {
                const title = getText(footerField.title, footerField.titleEn);
                const placeholder = getText(footerField.placeholder, footerField.placeholderEn);
                
                return (
                    <div className="custom-footer-field">
                        <label className="field-label">{title}</label>
                        <textarea
                            className="field-input large"
                            placeholder={placeholder}
                            value={footerField.value}
                            onChange={(e) => setFooterField(prev => ({ ...prev, value: e.target.value }))}
                            rows={4}
                            style={{color: settings.textColor}}
                        />
                    </div>
                );
            };

            // எடிட் மோடல்
            const EditFieldModal = () => {
                const [fieldData, setFieldData] = React.useState(editingField || {});
                const handleSave = () => {
                    updateField(fieldData.id, {
                        label: fieldData.label,
                        labelEn: fieldData.labelEn,
                        placeholder: fieldData.placeholder,
                        placeholderEn: fieldData.placeholderEn,
                        required: fieldData.required,
                        type: fieldData.type
                    });
                    setEditingField(null);
                };
                return (
                    <div className="field-edit-modal">
                        <div className="modal-content">
                            <div className="modal-header">
                                <div className="modal-title"><i className="fas fa-edit"></i> பீல்டு திருத்தம் / Edit Field</div>
                                <button className="close-modal" onClick={() => setEditingField(null)}><i className="fas fa-times"></i></button>
                            </div>
                            <div className="edit-field-row"><label>பெயர் (தமிழ்)</label><input value={fieldData.label || ''} onChange={e => setFieldData({...fieldData, label: e.target.value})} /></div>
                            <div className="edit-field-row"><label>Name (English)</label><input value={fieldData.labelEn || ''} onChange={e => setFieldData({...fieldData, labelEn: e.target.value})} /></div>
                            <div className="edit-field-row"><label>வகை / Type</label>
                                <select value={fieldData.type} onChange={e => setFieldData({...fieldData, type: e.target.value})}>
                                    <option value="text">Text / உரை</option>
                                    <option value="date">Date / தேதி</option>
                                    <option value="tel">Phone / தொலைபேசி</option>
                                    <option value="email">Email / மின்னஞ்சல்</option>
                                    <option value="select">Select / தேர்வு</option>
                                    <option value="address">Address / முகவரி</option>
                                    <option value="textarea">Textarea / நீண்ட உரை</option>
                                </select>
                            </div>
                            <div className="edit-field-row"><label>சான்று உரை (தமிழ்)</label><textarea value={fieldData.placeholder || ''} onChange={e => setFieldData({...fieldData, placeholder: e.target.value})} rows={2} /></div>
                            <div className="edit-field-row"><label>Placeholder (English)</label><textarea value={fieldData.placeholderEn || ''} onChange={e => setFieldData({...fieldData, placeholderEn: e.target.value})} rows={2} /></div>
                            <div className="edit-field-row"><label><input type="checkbox" checked={fieldData.required || false} onChange={e => setFieldData({...fieldData, required: e.target.checked})} /> கட்டாயம் / Required</label></div>
                            <div style={{display: 'flex', gap: 10, marginTop: 20}}><button className="btn btn-success" onClick={handleSave}>சேமிக்க / Save</button><button className="btn btn-danger" onClick={() => setEditingField(null)}>ரத்து / Cancel</button></div>
                        </div>
                    </div>
                );
            };

            const printForm = () => window.print();

            return (
                <div className="app-container">
                    {editingField && <EditFieldModal />}
                    <div className="app-header">
                        <h1><i className="fas fa-file-alt"></i> முழுமையான படிவ உருவாக்கி</h1>
                        <p>← Left / Right → நகர்த்தும் வசதி | PAN Card | Custom Footer Field</p>
                    </div>

                    <div className="main-content">
                        <div className="controls-panel">
                            {/* மொழி */}
                            <div className="section-title"><i className="fas fa-language"></i> மொழி / Language</div>
                            <div className="language-selector">
                                <button className={`lang-btn ${settings.language === 'tamil' ? 'active' : ''}`} onClick={() => updateSetting('language', 'tamil')}>தமிழ்</button>
                                <button className={`lang-btn ${settings.language === 'english' ? 'active' : ''}`} onClick={() => updateSetting('language', 'english')}>English</button>
                            </div>

                            {/* தலைப்பு வரிகள் */}
                            <div className="section-title"><i className="fas fa-heading"></i> தலைப்பு வரிகள் <button className="btn btn-success btn-sm" onClick={addTitleRow} style={{marginLeft: 'auto'}}><i className="fas fa-plus"></i></button></div>
                            <div className="title-rows-manager">
                                {titleRows.map(row => (
                                    <div key={row.id} className="title-row-item">
                                        <input type="text" className="title-row-input" value={getText(row.text, row.textEn)} onChange={e => updateTitleRow(row.id, e.target.value, settings.language === 'tamil')} placeholder="தலைப்பு வரி" />
                                        <button className="btn btn-danger btn-sm" onClick={() => removeTitleRow(row.id)}><i className="fas fa-trash"></i></button>
                                    </div>
                                ))}
                            </div>

                            {/* PAN Card Field Settings */}
                            <div className="section-title"><i className="fas fa-id-card"></i> PAN Card பீல்டு</div>
                            <div className="form-group">
                                <label>தலைப்பு (தமிழ்)</label>
                                <input type="text" value={panField.title} onChange={e => updatePanTitle(e.target.value, true)} />
                            </div>
                            <div className="form-group">
                                <label>Title (English)</label>
                                <input type="text" value={panField.titleEn} onChange={e => updatePanTitle(e.target.value, false)} />
                            </div>

                            {/* Footer Field Settings */}
                            <div className="section-title"><i className="fas fa-pen-alt"></i> கீழ்ப்பகுதி பீல்டு</div>
                            <div className="form-group">
                                <label>தலைப்பு (தமிழ்)</label>
                                <input type="text" value={footerField.title} onChange={e => updateFooterTitle(e.target.value, true)} />
                            </div>
                            <div className="form-group">
                                <label>Title (English)</label>
                                <input type="text" value={footerField.titleEn} onChange={e => updateFooterTitle(e.target.value, false)} />
                            </div>

                            {/* படிவ அமைப்புகள் */}
                            <div className="section-title"><i className="fas fa-cog"></i> படிவ அமைப்புகள்</div>
                            <div className="form-group"><label>படிவத் தலைப்பு (தமிழ்)</label><input value={settings.formTitle} onChange={e => updateSetting('formTitle', e.target.value)} /></div>
                            <div className="form-group"><label>Form Title (English)</label><input value={settings.formTitleEn} onChange={e => updateSetting('formTitleEn', e.target.value)} /></div>
                            <div className="form-group"><label>துணைத் தலைப்பு (தமிழ்)</label><input value={settings.formSubtitle} onChange={e => updateSetting('formSubtitle', e.target.value)} /></div>
                            <div className="form-group"><label>Subtitle (English)</label><input value={settings.formSubtitleEn} onChange={e => updateSetting('formSubtitleEn', e.target.value)} /></div>

                            {/* லேஅவுட் */}
                            <div className="section-title"><i className="fas fa-columns"></i> பக்க அமைப்பு</div>
                            <div className="layout-selector">
                                <button className={`layout-btn ${settings.layout === 'single' ? 'active' : ''}`} onClick={() => updateSetting('layout', 'single')}>
                                    <i className="fas fa-align-left"></i> {getText('ஒற்றை நிரல்', 'Single Column')}
                                </button>
                                <button className={`layout-btn ${settings.layout === 'double' ? 'active' : ''}`} onClick={() => updateSetting('layout', 'double')}>
                                    <i className="fas fa-columns"></i> {getText('இரட்டை நிரல்', 'Double Column')}
                                </button>
                                <button className={`layout-btn ${settings.layout === 'mixed' ? 'active' : ''}`} onClick={() => updateSetting('layout', 'mixed')}>
                                    <i className="fas fa-layer-group"></i> {getText('கலப்பு', 'Mixed')}
                                </button>
                            </div>
                            {settings.layout === 'double' && (
                                <div style={{fontSize: '12px', color: '#64748b', marginTop: '8px', padding: '8px', background: '#e0f2fe', borderRadius: '6px'}}>
                                    <i className="fas fa-info-circle"></i> {getText('← L / R → பொத்தான்களைப் பயன்படுத்தி பீல்டுகளை இடது/வலது நகர்த்தவும்', 'Use ← L / R → buttons to move fields left/right')}
                                </div>
                            )}

                            {/* வடிவமைப்பு */}
                            <div className="section-title"><i className="fas fa-paint-brush"></i> வடிவமைப்பு</div>
                            <div className="form-group"><label>எழுத்து நிறம்</label><div className="color-picker">{colorOptions.map((c, i) => <div key={i} className={`color-option ${settings.textColor === c ? 'active' : ''}`} style={{backgroundColor: c}} onClick={() => updateSetting('textColor', c)} />)}</div></div>

                            {/* பீல்டுகள் சேர்க்க */}
                            <div className="section-title"><i className="fas fa-plus"></i> பீல்டுகள் சேர்க்க</div>
                            <div className="predefined-fields">{predefinedFields.map((f, i) => <div key={i} className="predefined-field" onClick={() => addField(f.type, f.label, f.labelEn)}><i className={f.icon} style={{marginRight: 8}}></i>{f.label}</div>)}</div>

                            {/* செயல்கள் */}
                            <div className="section-title"><i className="fas fa-download"></i> செயல்கள்</div>
                            <button className="btn btn-success btn-block" onClick={printForm}><i className="fas fa-print"></i> {getText('அச்சிடு / PDF', 'Print / PDF')}</button>
                        </div>

                        <div className="form-preview">
                            <div className="form-preview-page" style={{color: settings.textColor, backgroundColor: settings.backgroundColor}}>
                                {/* Header */}
                                <div className="form-header">
                                    <div className="logo-section"><div className="logo-box" onClick={() => document.getElementById('logo1-upload').click()}><input type="file" id="logo1-upload" style={{display: 'none'}} onChange={handleLogoUpload(setLogo1)} />{logo1 ? <img src={logo1} className="logo-img" /> : <div className="logo-placeholder"><i className="fas fa-camera"></i></div>}</div><div className="info-text">{getText('அலுவலக முத்திரை', 'Office Seal')}</div></div>
                                    <div className="title-section"><div className="form-main-title">{getText(settings.formTitle, settings.formTitleEn)}</div><div className="form-sub-title">{getText(settings.formSubtitle, settings.formSubtitleEn)}</div>{titleRows.map(row => <div key={row.id} className="form-details">{getText(row.text, row.textEn)}</div>)}</div>
                                    <div className="stamp-section"><div className="logo-box" onClick={() => document.getElementById('logo2-upload').click()}><input type="file" id="logo2-upload" style={{display: 'none'}} onChange={handleLogoUpload(setLogo2)} />{logo2 ? <img src={logo2} className="logo-img" /> : <div className="logo-placeholder"><i className="fas fa-stamp"></i></div>}</div><div className="info-text">{getText('அலுவலக சீல்', 'Office Stamp')}</div></div>
                                </div>

                                {/* Form Body - Fields */}
                                <div className="form-body">
                                    {renderFieldsByLayout()}

                                    {/* PAN CARD FIELD */}
                                    {renderPanCardField()}

                                    {/* Required Documents */}
                                    <div className="required-documents">
                                        <div className="field-label">{getText('முக்கிய குறிப்புகள்:', 'Important Notes:')}</div>
                                        <ul className="documents-list">
                                            <li>{getText('அனைத்து கட்டாய கட்டங்களும் நிரப்பப்பட வேண்டும்', 'All mandatory fields must be filled')}</li>
                                            <li>* {getText('குறியிட்ட கட்டங்கள் கட்டாயம்', 'Marked fields are mandatory')}</li>
                                            <li>{getText('PAN கார்டு எண் 10 இலக்கங்கள் கொண்டதாக இருக்க வேண்டும்', 'PAN Card number must be 10 characters')}</li>
                                        </ul>
                                    </div>

                                    {/* CUSTOM FOOTER FIELD */}
                                    {renderFooterField()}

                                    {/* Signature Section */}
                                    <div className="field-row" style={{marginTop: '20px'}}>
                                        <div style={{paddingTop: '20px', borderTop: '2px solid #000'}}>
                                            <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                                <div><div style={{marginBottom: 8, fontWeight: 600}}>{getText('விண்ணப்பதாரர் கையொப்பம்', 'Applicant Signature')}</div><div>{getText('தேதி:', 'Date:')} ________________</div></div>
                                                <div><div style={{marginBottom: 8, fontWeight: 600}}>{getText('அலுவலக சீல்', 'Office Seal')}</div><div>{getText('தேதி:', 'Date:')} ________________</div></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="form-actions">
                                <button className="btn btn-success" onClick={printForm}><i className="fas fa-print"></i> {getText('அச்சிடு', 'Print')}</button>
                                <button className="btn btn-primary" onClick={() => alert(getText('படிவம் சமர்ப்பிக்கப்பட்டது!', 'Form Submitted!'))}><i className="fas fa-check"></i> {getText('சமர்ப்பிக்க', 'Submit')}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<AdvancedFormBuilder />, document.getElementById('root'));
    </script>
</body>
</html>
